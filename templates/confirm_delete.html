{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 4rem auto; text-align: center; padding: 3rem 2rem;">
    <div style="font-size: 4rem; margin-bottom: 1.5rem;">⚠️</div>
    <h2 style="color: var(--danger-color); margin-bottom: 1rem;">Confirm Deletion</h2>
    <p style="font-size: 1.15rem; color: var(--text-secondary); margin-bottom: 2.5rem;">
        Are you sure you want to delete this item? This action is permanent and cannot be undone.
    </p>

    <form method="post" style="display: flex; justify-content: center; gap: 15px;">
        {% csrf_token %}
        <a href="{{ request.META.HTTP_REFERER|default:'dashboard' }}" class="btn btn-secondary" style="padding: 0.75rem 2rem; font-size: 1.1rem; font-weight: 600;">Cancel</a>
        <button type="submit" class="btn btn-danger" style="padding: 0.75rem 2rem; font-size: 1.1rem; font-weight: 600;">Confirm Delete</button>
    </form>
</div>
{% endblock %}
