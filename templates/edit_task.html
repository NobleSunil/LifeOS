{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h1>Edit Task</h1>
</div>

<div class="layout-grid">
    <div class="form-section card">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'tasks_list' %}" class="btn btn-secondary" style="margin-left: 10px;">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
