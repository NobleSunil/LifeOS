{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h1>Edit Reflection</h1>
</div>

<div class="layout-grid">
    <div class="form-section card">
        <h3 style="margin-bottom: 1rem; color: var(--secondary-color);">
            Reflection for {{ reflection.date|date:"l, F j, Y" }}
        </h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'reflections_list' %}" class="btn btn-secondary" style="margin-left: 10px;">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
